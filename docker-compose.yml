# Docker Compose for local development
version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: loviary-postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: loviary
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: loviary-api
    environment:
      APP_ENV: development
      APP_PORT: 8080
      DATABASE_HOST: postgres
      DATABASE_PORT: 5432
      DATABASE_USER: postgres
      DATABASE_PASSWORD: postgres
      DATABASE_NAME: loviary
      DATABASE_SSLMODE: disable
      DATABASE_TIMEZONE: Asia/Ho_Chi_Minh
      JWT_SECRET: dev-secret-key-change-in-production-min-256-bits
      JWT_ACCESS_TOKEN_TTL: 15m
      JWT_REFRESH_TOKEN_TTL: 720h
      LOG_LEVEL: debug
      LOG_FORMAT: json
      # Email/SMTP Configuration
      SMTP_HOST: smtp.gmail.com
      SMTP_PORT: 587
      SMTP_USERNAME: amory.dev@gmail.com
      SMTP_PASSWORD: atfz tqfu agrq mjsb
      SMTP_FROM: amory.dev@gmail.com
      SMTP_ENABLED: true
      # Google OAuth
      GOOGLE_CLIENT_ID: YOUR_GOOGLE_CLIENT_ID
      GOOGLE_CLIENT_SECRET: YOUR_GOOGLE_CLIENT_SECRET
      GOOGLE_REDIRECT_URI: http://localhost:8080/api/v1/auth/google/callback
      # Feature Flags
      FEATURE_MOOD_TRACKING: true
      FEATURE_MEMORIES: true
      FEATURE_DAILY_SPARKS: true
      FEATURE_PROMISES: true
      FEATURE_LOVE_GOALS: true
      FEATURE_TIME_CAPSULES: true
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    # For development, mount source and use air for hot reload
    # volumes:
    #   - .:/app
    # command: ["air", "-c", ".air.toml"]

volumes:
  postgres_data:
